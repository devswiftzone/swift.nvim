# Labeler configuration for automatic PR labeling
# https://github.com/actions/labeler (v5 format)

documentation:
  - changed-files:
    - any-glob-to-any-file:
      - '**/*.md'
      - 'docs/**/*'
      - 'examples/**/*.md'

ci:
  - changed-files:
    - any-glob-to-any-file:
      - '.github/workflows/**'
      - '.github/**/*.yml'

core:
  - changed-files:
    - any-glob-to-any-file:
      - 'lua/swift/init.lua'
      - 'lua/swift/core/**'
      - 'plugin/**'

feature:lsp:
  - changed-files:
    - any-glob-to-any-file:
      - 'lua/swift/features/lsp.lua'

feature:debugger:
  - changed-files:
    - any-glob-to-any-file:
      - 'lua/swift/features/debugger.lua'

feature:formatter:
  - changed-files:
    - any-glob-to-any-file:
      - 'lua/swift/features/formatter.lua'

feature:linter:
  - changed-files:
    - any-glob-to-any-file:
      - 'lua/swift/features/linter.lua'

feature:build:
  - changed-files:
    - any-glob-to-any-file:
      - 'lua/swift/features/build_runner.lua'

feature:xcode:
  - changed-files:
    - any-glob-to-any-file:
      - 'lua/swift/features/xcode.lua'

feature:targets:
  - changed-files:
    - any-glob-to-any-file:
      - 'lua/swift/features/target_manager.lua'

tests:
  - changed-files:
    - any-glob-to-any-file:
      - 'tests/**'
      - '**/*_spec.lua'

bug:
  - changed-files:
    - any-glob-to-any-file:
      - 'lua/swift/health.lua'
      - 'lua/swift/core/utils.lua'
